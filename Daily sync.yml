name: Daily task sync

# Runs once a day to refresh open "good first issue" / "help wanted" tasks
# for each project, using GitHub's API + DeepSeek (via OpenRouter) to
# summarize and estimate effort, then writes results to Supabase.

on:
  schedule:
    - cron: '0 3 * * *'   # 3:00 AM UTC every day
  workflow_dispatch:        # allows manual "Run workflow" button in the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @supabase/supabase-js

      - name: Run sync script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-tasks.js